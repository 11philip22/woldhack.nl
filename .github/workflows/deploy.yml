name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.154.0"
          extended: true

      - name: Build Site
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          HUGO_BASEURL: ${{ vars.HUGO_BASEURL }}
        run: |
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            BASE_URL="https://${CUSTOM_DOMAIN}/"
            printf '%s\n' "$CUSTOM_DOMAIN" > static/CNAME
          elif [[ -n "$HUGO_BASEURL" ]]; then
            BASE_URL="$HUGO_BASEURL"
          else
            BASE_URL="${{ steps.pages.outputs.base_url }}/"
          fi

          hugo --gc --minify --baseURL "$BASE_URL"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
