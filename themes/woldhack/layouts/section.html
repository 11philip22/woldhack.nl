{{ define "main" }}
  <section class="panel hero-panel">
    <div class="panel-head">
      <p class="panel-label">Section</p>
      <span class="panel-meta">{{ len .Pages }} entries</span>
    </div>
    <h1 class="hero-title">{{ .Title }}</h1>
    {{ with .Content }}
      <div class="rich-content">{{ . }}</div>
    {{ end }}
  </section>

  <section class="panel">
    <div class="panel-head">
      <p class="panel-label">Entries</p>
    </div>
    <div class="card-grid">
      {{ range .Pages.ByDate.Reverse }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
