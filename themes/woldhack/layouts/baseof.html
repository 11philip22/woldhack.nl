<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="woldhack-theme">
  <div class="site-shell">
    <header class="site-header">
      <div class="site-wrap">
        {{ partial "header.html" . }}
      </div>
    </header>
    <main class="site-main">
      <div class="site-wrap">
        {{ block "main" . }}{{ end }}
      </div>
    </main>
    <footer class="site-footer">
      <div class="site-wrap">
        {{ partial "footer.html" . }}
      </div>
    </footer>
  </div>
</body>
</html>
