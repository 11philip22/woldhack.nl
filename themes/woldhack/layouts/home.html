{{ define "main" }}
  {{ $postsPages := where site.RegularPages "Section" "posts" }}

  <section class="panel hero-panel">
    <div class="panel-head">
      <p class="panel-label">Overview</p>
      <span class="panel-meta">{{ len $postsPages }} entries</span>
    </div>
    <h1 class="hero-title">{{ site.Title }}</h1>
    {{ with .Content }}
      <div class="rich-content">{{ . }}</div>
    {{ end }}
  </section>

  <section class="panel">
    <div class="panel-head">
      <p class="panel-label">Latest Posts</p>
    </div>
    <div class="card-grid">
      {{ range $postsPages.ByDate.Reverse }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
